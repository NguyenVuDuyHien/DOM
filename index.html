<!DOCTYPE html>
<html lang="vi">
<head>
    <!--<link rel = "stylesheet" href = "../css/style6.css">--> <!-- Latest compiled and minified CSS --> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"> 
    <!-- Latest compiled JavaScript --> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <meta charset="UTF-8">
    <title>Giải hệ phương trình 2 ẩn</title>
</head>
<body>

    <h2 class="mb-4 text-center">Giải hệ phương trình 2 ẩn</h2>

    <div class="mb-3">
        <label>Phương trình 1:</label><br>
        <input type="number" id="a" class="form-control d-inline w-25"> x +
        <input type="number" id="b" class="form-control d-inline w-25"> y =
        <input type="number" id="c" class="form-control d-inline w-25">
    </div>

    <div class="mb-3">
        <label>Phương trình 2:</label><br>
        <input type="number" id="d" class="form-control d-inline w-25"> x +
        <input type="number" id="e" class="form-control d-inline w-25"> y =
        <input type="number" id="f" class="form-control d-inline w-25">
    </div>

    <button onclick="giaiHe()" class="btn btn-primary">Giải</button>

    <h3 id="ketqua" class="mt-4 text-danger"></h3>

    <script>
        function giaiHe() {
            let a = Number(document.getElementById("a").value);
            let b = Number(document.getElementById("b").value);
            let c = Number(document.getElementById("c").value);
            let d = Number(document.getElementById("d").value);
            let e = Number(document.getElementById("e").value);
            let f = Number(document.getElementById("f").value);

            let D = a * e - b * d;
            let Dx = c * e - b * f;
            let Dy = a * f - c * d;

            let ketqua = document.getElementById("ketqua");

            if (D == 0) {
                if (Dx == 0 && Dy == 0) {
                    ketqua.innerHTML = "Hệ phương trình vô số nghiệm";
                } else {
                    ketqua.innerHTML = "Hệ phương trình vô nghiệm";
                }
            } else {
                let x = Dx / D;
                let y = Dy / D;
                ketqua.innerHTML = "Nghiệm: x = " + x + ", y = " + y;
            }
        }
    </script>

</body>
</html>
